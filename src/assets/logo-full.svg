<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" fill="none">
  <!-- ── Camera mark (left, scaled to fit 80×80) ── -->
  <!-- Camera body -->
  <rect x="5" y="22" width="90" height="54" rx="8" fill="#F5E6C8"/>
  <!-- Viewfinder notch -->
  <path d="M33 22V14C33 11.8 34.8 10 37 10H63C65.2 10 67 11.8 67 14V22H33Z" fill="#F5E6C8"/>
  <!-- Shutter button -->
  <rect x="72" y="13" width="14" height="11" rx="4" fill="#D4850A"/>
  <!-- Lens outer ring -->
  <circle cx="50" cy="49" r="20" fill="none" stroke="#D4850A" stroke-width="3"/>
  <!-- Lens body -->
  <circle cx="50" cy="49" r="15" fill="#4A2C17"/>
  <!-- Lens inner ring -->
  <circle cx="50" cy="49" r="10" fill="none" stroke="#D4850A" stroke-width="1.5" opacity="0.7"/>
  <!-- Lens center -->
  <circle cx="50" cy="49" r="5" fill="#D4850A" opacity="0.9"/>
  <!-- Lens reflection -->
  <circle cx="44" cy="44" r="2.5" fill="#F5E6C8" opacity="0.25"/>
  <!-- Viewfinder window -->
  <rect x="12" y="29" width="18" height="13" rx="3" fill="#D4850A" opacity="0.7"/>

  <!-- ── Divider line ── -->
  <line x1="108" y1="16" x2="108" y2="64" stroke="#D4850A" stroke-width="1.5" opacity="0.4"/>

  <!-- ── Wordmark ── -->
  <!-- RETROPPIES — primary text -->
  <text
    x="122" y="46"
    font-family="'VT323', 'Courier New', monospace"
    font-size="38"
    letter-spacing="3"
    fill="#F5E6C8"
  >RETROPPIES</text>
  <!-- PHOTOBOOTH — subtitle -->
  <text
    x="123" y="64"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="11"
    letter-spacing="7"
    fill="#D4850A"
    opacity="0.9"
  >PHOTOBOOTH</text>
</svg>
